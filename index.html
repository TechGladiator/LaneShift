<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>Lane Shift</title>
  <style>
    :root {
      --bg: #0c1020;
      --bg2: #111937;
      --lane: rgba(255, 255, 255, 0.08);
      --lane-strong: rgba(255, 255, 255, 0.14);
      --text: #e9f0ff;
      --muted: #9fb2dd;
      --player: #6ef7ff;
      --player-glow: rgba(110, 247, 255, 0.6);
      --obstacle: #ff5678;
      --obstacle-glow: rgba(255, 86, 120, 0.55);
      --accent: #b8ff5f;
      --panel: rgba(7, 11, 26, 0.78);
      --btn: #1e2c58;
      --btn-hover: #2a3e7b;
      --flash: rgba(255, 255, 255, 0.2);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 30% 20%, var(--bg2), var(--bg));
      touch-action: manipulation;
    }

    body {
      display: grid;
      place-items: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    #game-shell {
      position: relative;
      width: min(96vw, 560px);
      aspect-ratio: 9 / 16;
      max-height: 96vh;
      border-radius: 18px;
      overflow: hidden;
      box-shadow:
        0 20px 45px rgba(0, 0, 0, 0.45),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0));
      isolation: isolate;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(5, 9, 23, 0.48);
      backdrop-filter: blur(2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      z-index: 3;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .panel {
      width: min(88%, 360px);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 24px 20px;
      text-align: center;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      transform: translateY(6px) scale(0.99);
      opacity: 0;
      transition: transform 180ms ease, opacity 180ms ease;
    }

    .overlay.show .panel {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 6vw, 44px);
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.25);
    }

    p {
      margin: 8px 0;
      color: var(--muted);
      font-size: clamp(14px, 2.8vw, 17px);
    }

    .score-line {
      margin-top: 10px;
      color: var(--text);
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .new-record {
      margin-top: 6px;
      min-height: 1.3em;
      color: var(--accent);
      font-weight: 700;
      font-size: 0.95rem;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 150ms ease, transform 150ms ease;
    }

    .new-record.show {
      opacity: 1;
      transform: translateY(0);
    }

    button {
      margin-top: 16px;
      border: 0;
      border-radius: 10px;
      background: var(--btn);
      color: var(--text);
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      min-width: 160px;
      transition: transform 90ms ease, background 120ms ease;
    }

    button:hover,
    button:focus-visible {
      background: var(--btn-hover);
      outline: none;
    }

    button:active {
      transform: scale(0.98);
    }

    .hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      z-index: 2;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.6);
    }

    .hud-item {
      background: rgba(8, 13, 32, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: clamp(11px, 2.2vw, 13px);
    }

    .death-flash {
      position: absolute;
      inset: 0;
      background: var(--flash);
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      transition: opacity 80ms ease;
    }

    .death-flash.show {
      opacity: 1;
    }

    @media (max-width: 480px) {
      #game-shell {
        width: 100vw;
        height: 100vh;
        max-height: none;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <main id="game-shell" aria-label="Lane Shift game area">
    <canvas id="game" aria-label="Lane Shift Canvas"></canvas>

    <div class="hud" id="hud" hidden>
      <div class="hud-item">Score: <span id="scoreVal">0</span></div>
      <div class="hud-item">High: <span id="highVal">0</span></div>
    </div>

    <div class="overlay show" id="titleOverlay">
      <section class="panel">
        <h1>Lane Shift</h1>
        <p>Tap or click to shift lanes</p>
        <button id="startBtn" type="button">Start</button>
      </section>
    </div>

    <div class="overlay" id="gameOverOverlay">
      <section class="panel">
        <h1>Game Over</h1>
        <p class="score-line">Score: <span id="finalScore">0</span></p>
        <p class="score-line">High Score: <span id="finalHigh">0</span></p>
        <p class="new-record" id="newRecordMsg">New High Score!</p>
        <button id="restartBtn" type="button">Restart</button>
        <p style="font-size: 0.85rem; margin-top: 10px;">Tap anywhere to restart</p>
      </section>
    </div>

    <div class="death-flash" id="deathFlash"></div>
  </main>

  <script>
    (function () {
      'use strict';

      // ---------------------------
      // Canvas & responsive scaling
      // ---------------------------
      const shell = document.getElementById('game-shell');
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      // Base virtual resolution for consistent gameplay proportions.
      const BASE_W = 360;
      const BASE_H = 640;

      function resizeCanvas() {
        const rect = shell.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.floor(rect.width * dpr);
        canvas.height = Math.floor(rect.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        state.view.width = rect.width;
        state.view.height = rect.height;
        state.view.scale = Math.min(rect.width / BASE_W, rect.height / BASE_H);

        // Recompute lane centers after resize.
        recalcLanes();
      }

      // ---------------------------
      // UI references
      // ---------------------------
      const hud = document.getElementById('hud');
      const scoreVal = document.getElementById('scoreVal');
      const highVal = document.getElementById('highVal');

      const titleOverlay = document.getElementById('titleOverlay');
      const gameOverOverlay = document.getElementById('gameOverOverlay');
      const deathFlash = document.getElementById('deathFlash');

      const startBtn = document.getElementById('startBtn');
      const restartBtn = document.getElementById('restartBtn');
      const finalScoreEl = document.getElementById('finalScore');
      const finalHighEl = document.getElementById('finalHigh');
      const newRecordMsg = document.getElementById('newRecordMsg');

      // ---------------------------
      // Game data
      // ---------------------------
      const HIGH_SCORE_KEY = 'laneShiftHighScore';

      function readHighScore() {
        try {
          const raw = localStorage.getItem(HIGH_SCORE_KEY);
          const parsed = Number(raw);
          return Number.isFinite(parsed) && parsed > 0 ? Math.floor(parsed) : 0;
        } catch (_) {
          // Storage is optional (can throw in sandboxed/opaque origins).
          return 0;
        }
      }

      function persistHighScore(value) {
        try {
          localStorage.setItem(HIGH_SCORE_KEY, String(value));
        } catch (_) {
          // Ignore persistence failures and continue with in-memory score.
        }
      }

      const GAME_STATE = {
        TITLE: 'title',
        PLAYING: 'playing',
        GAMEOVER: 'gameover'
      };

      const state = {
        mode: GAME_STATE.TITLE,
        view: { width: BASE_W, height: BASE_H, scale: 1 },

        lanes: [],
        laneWidth: 0,
        playTop: 0,
        playBottom: 0,

        player: {
          lane: 1,
          x: 0,
          y: 0,
          radius: 12,
          startX: 0,
          targetX: 0,
          moveT: 1,
          moveDuration: 0.1
        },

        obstacles: [],
        obstacleSize: 24,

        score: 0,
        highScore: readHighScore(),
        sessionNewHigh: false,

        elapsed: 0,
        spawnTimer: 0,
        lastSpawnLane: -1,

        // Difficulty baseline values.
        speed: 150,
        spawnInterval: 1.0,

        inputLockedUntil: 0,
        lastTs: 0,

        // Tiny death shake/flash polish.
        shake: {
          time: 0,
          duration: 0.28,
          magnitude: 8,
          x: 0,
          y: 0
        }
      };

      highVal.textContent = state.highScore;

      function recalcLanes() {
        const w = state.view.width;
        const h = state.view.height;

        state.laneWidth = w / 3;
        state.lanes = [
          state.laneWidth * 0.5,
          state.laneWidth * 1.5,
          state.laneWidth * 2.5
        ];

        state.playTop = h * 0.08;
        state.playBottom = h * 0.9;

        const p = state.player;
        // Keep player clearly above the bottom edge on all aspect ratios.
        p.radius = Math.max(12, 13 * state.view.scale);
        p.y = state.playBottom - p.radius * 2.2;

        p.x = state.lanes[p.lane] || state.lanes[1];
        p.startX = p.x;
        p.targetX = p.x;

        // Keep active obstacles aligned to their logical lanes after resizes/rotation.
        for (let i = 0; i < state.obstacles.length; i++) {
          const obstacle = state.obstacles[i];
          obstacle.x = state.lanes[obstacle.lane] || state.lanes[1];
        }
      }

      // ---------------------------
      // State transitions
      // ---------------------------
      function showTitle() {
        state.mode = GAME_STATE.TITLE;
        titleOverlay.classList.add('show');
        gameOverOverlay.classList.remove('show');
        hud.hidden = true;
      }

      function startGame() {
        state.mode = GAME_STATE.PLAYING;
        state.score = 0;
        state.elapsed = 0;
        state.spawnTimer = 0.25;
        state.lastSpawnLane = -1;
        state.speed = 150;
        state.spawnInterval = 1.0;
        state.obstacles.length = 0;
        state.sessionNewHigh = false;

        const p = state.player;
        p.lane = 1;
        p.x = state.lanes[p.lane];
        p.startX = p.x;
        p.targetX = p.x;
        p.moveT = 1;

        state.inputLockedUntil = performance.now() + 120;

        titleOverlay.classList.remove('show');
        gameOverOverlay.classList.remove('show');
        hud.hidden = false;
        updateHud();
      }

      function endGame() {
        if (state.mode !== GAME_STATE.PLAYING) return;

        state.mode = GAME_STATE.GAMEOVER;
        triggerDeathEffects();

        const roundedScore = Math.floor(state.score);
        finalScoreEl.textContent = roundedScore;

        if (roundedScore > state.highScore) {
          state.highScore = roundedScore;
          persistHighScore(state.highScore);
          state.sessionNewHigh = true;
        }

        highVal.textContent = state.highScore;
        finalHighEl.textContent = state.highScore;
        newRecordMsg.classList.toggle('show', state.sessionNewHigh);

        gameOverOverlay.classList.add('show');

        // Short lock to prevent immediate double trigger when collision and click overlap.
        state.inputLockedUntil = performance.now() + 220;
      }

      // ---------------------------
      // Input handling
      // ---------------------------
      function shiftLane() {
        if (state.mode !== GAME_STATE.PLAYING) return;
        const now = performance.now();
        if (now < state.inputLockedUntil) return;

        const p = state.player;
        p.lane = (p.lane + 1) % 3;
        p.startX = p.x;
        p.targetX = state.lanes[p.lane];
        p.moveT = 0;

        // Small tap lock to avoid accidental double-input on some touch devices.
        state.inputLockedUntil = now + 80;
      }

      function handlePrimaryAction() {
        const now = performance.now();

        if (state.mode === GAME_STATE.TITLE) {
          if (now >= state.inputLockedUntil) {
            startGame();
          }
          return;
        }

        if (state.mode === GAME_STATE.PLAYING) {
          shiftLane();
          return;
        }

        if (state.mode === GAME_STATE.GAMEOVER) {
          if (now >= state.inputLockedUntil) {
            startGame();
          }
        }
      }

      // Pointer events unify touch + mouse nicely.
      shell.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        handlePrimaryAction();
      }, { passive: false });

      startBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        handlePrimaryAction();
      });

      restartBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        handlePrimaryAction();
      });

      // Prevent scrolling/gesture during play area interaction.
      ['touchstart', 'touchmove', 'gesturestart'].forEach((type) => {
        shell.addEventListener(type, (e) => {
          if (state.mode === GAME_STATE.PLAYING) {
            e.preventDefault();
          }
        }, { passive: false });
      });

      // ---------------------------
      // Gameplay logic
      // ---------------------------
      function updateHud() {
        const scoreInt = Math.floor(state.score);
        scoreVal.textContent = scoreInt;
        highVal.textContent = Math.max(state.highScore, scoreInt);
      }

      function currentDifficulty() {
        // Gentle progression over time; capped to stay fair/readable.
        const t = state.elapsed;
        const speed = Math.min(150 + t * 9, 290);
        const spawnInterval = Math.max(1.0 - t * 0.018, 0.46);
        return { speed, spawnInterval };
      }

      function canSpawnInLane(lane) {
        // Fairness guard:
        // avoid making 3 consecutive obstacles in the exact same lane
        // at tight timing windows that can feel repetitive/unreadable.
        if (lane === state.lastSpawnLane) {
          const veryFast = state.spawnInterval < 0.62;
          if (veryFast && Math.random() < 0.65) return false;
        }
        return true;
      }

      function spawnObstacle() {
        const size = Math.max(18, state.obstacleSize * state.view.scale);

        const laneOrder = [0, 1, 2].sort(() => Math.random() - 0.5);
        let lane = laneOrder[0];
        for (let i = 0; i < laneOrder.length; i++) {
          if (canSpawnInLane(laneOrder[i])) {
            lane = laneOrder[i];
            break;
          }
        }

        state.obstacles.push({
          lane,
          x: state.lanes[lane],
          y: state.playTop - size * 1.4,
          size,
          rot: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() * 2 - 1) * 0.9
        });

        state.lastSpawnLane = lane;
      }

      function updatePlayer(dt) {
        const p = state.player;
        if (p.moveT < 1) {
          p.moveT = Math.min(1, p.moveT + dt / p.moveDuration);
          const t = 1 - Math.pow(1 - p.moveT, 3); // easeOutCubic
          p.x = p.startX + (p.targetX - p.startX) * t;
        }
      }

      function updateObstacles(dt) {
        for (let i = state.obstacles.length - 1; i >= 0; i--) {
          const o = state.obstacles[i];
          o.y += state.speed * dt;
          o.rot += o.rotSpeed * dt;

          if (o.y - o.size > state.view.height + 10) {
            state.obstacles.splice(i, 1);
          }
        }
      }

      function checkCollision() {
        const p = state.player;
        for (let i = 0; i < state.obstacles.length; i++) {
          const o = state.obstacles[i];

          const dx = Math.abs(o.x - p.x);
          const dy = Math.abs(o.y - p.y);
          const hitX = dx < (o.size * 0.52 + p.radius * 0.8);
          const hitY = dy < (o.size * 0.52 + p.radius * 0.8);

          if (hitX && hitY) {
            endGame();
            return;
          }
        }
      }

      function triggerDeathEffects() {
        state.shake.time = state.shake.duration;

        deathFlash.classList.add('show');
        setTimeout(() => deathFlash.classList.remove('show'), 90);
      }

      function updateShake(dt) {
        const s = state.shake;
        if (s.time <= 0) {
          s.x = 0;
          s.y = 0;
          return;
        }

        s.time = Math.max(0, s.time - dt);
        const strength = (s.time / s.duration) * s.magnitude;
        s.x = (Math.random() * 2 - 1) * strength;
        s.y = (Math.random() * 2 - 1) * strength;
      }

      function update(dt) {
        if (state.mode !== GAME_STATE.PLAYING) {
          updateShake(dt);
          return;
        }

        state.elapsed += dt;
        state.score += dt * 10;

        const diff = currentDifficulty();
        state.speed = diff.speed * state.view.scale;
        state.spawnInterval = diff.spawnInterval;

        state.spawnTimer -= dt;
        if (state.spawnTimer <= 0) {
          spawnObstacle();
          // Slight jitter keeps cadence organic but readable.
          const jitter = (Math.random() - 0.5) * 0.12;
          state.spawnTimer = Math.max(0.3, state.spawnInterval + jitter);
        }

        updatePlayer(dt);
        updateObstacles(dt);
        checkCollision();
        updateHud();
        updateShake(dt);
      }

      // ---------------------------
      // Rendering
      // ---------------------------
      function drawBackground() {
        const w = state.view.width;
        const h = state.view.height;

        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, '#121a3a');
        grad.addColorStop(1, '#090d1d');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);

        // Subtle star-like speckles for depth.
        ctx.globalAlpha = 0.14;
        for (let i = 0; i < 22; i++) {
          const x = (i * 53.17) % w;
          const y = ((i * 97.77) + state.elapsed * 8) % h;
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(x, y, 1.5, 1.5);
        }
        ctx.globalAlpha = 1;
      }

      function drawLanes() {
        const w = state.view.width;
        const h = state.view.height;

        // Lane tint panels.
        ctx.fillStyle = 'rgba(255,255,255,0.02)';
        for (let i = 0; i < 3; i++) {
          ctx.fillRect(i * state.laneWidth, 0, state.laneWidth, h);
        }

        // Dividers.
        ctx.strokeStyle = 'rgba(255,255,255,0.13)';
        ctx.lineWidth = Math.max(1, 1.2 * state.view.scale);

        for (let i = 1; i < 3; i++) {
          const x = i * state.laneWidth;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, h);
          ctx.stroke();
        }
      }

      function drawPlayer() {
        const p = state.player;

        // Slight pulse to make player visible and alive.
        const pulse = 1 + Math.sin(state.elapsed * 8) * 0.035;
        const r = p.radius * pulse;

        ctx.save();
        ctx.translate(p.x, p.y);

        // Ground glow helps visibility against all backgrounds.
        ctx.save();
        ctx.fillStyle = 'rgba(110, 247, 255, 0.26)';
        ctx.beginPath();
        ctx.ellipse(0, r * 1.35, r * 1.15, r * 0.36, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.shadowColor = 'rgba(110, 247, 255, 0.9)';
        ctx.shadowBlur = 20 * state.view.scale;

        // Triangle-like shape for directional visual identity.
        ctx.fillStyle = '#6ef7ff';
        ctx.beginPath();
        ctx.moveTo(0, -r * 1.05);
        ctx.lineTo(r * 0.95, r * 0.9);
        ctx.lineTo(-r * 0.95, r * 0.9);
        ctx.closePath();
        ctx.fill();

        // Core highlight.
        ctx.shadowBlur = 0;
        ctx.lineWidth = Math.max(1.5, 2.2 * state.view.scale);
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.arc(0, r * 0.12, r * 0.26, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function drawObstacles() {
        for (let i = 0; i < state.obstacles.length; i++) {
          const o = state.obstacles[i];
          ctx.save();
          ctx.translate(o.x, o.y);
          ctx.rotate(o.rot);

          ctx.shadowColor = 'rgba(255, 86, 120, 0.6)';
          ctx.shadowBlur = 12 * state.view.scale;
          ctx.fillStyle = '#ff5678';

          const s = o.size;
          ctx.fillRect(-s * 0.5, -s * 0.5, s, s);

          // inner notch for style/readability
          ctx.shadowBlur = 0;
          ctx.fillStyle = 'rgba(255,255,255,0.17)';
          ctx.fillRect(-s * 0.18, -s * 0.18, s * 0.36, s * 0.36);

          ctx.restore();
        }
      }

      function render() {
        const w = state.view.width;
        const h = state.view.height;

        ctx.save();
        ctx.clearRect(0, 0, w, h);

        // Apply tiny shake on death.
        ctx.translate(state.shake.x, state.shake.y);

        drawBackground();
        drawLanes();
        drawObstacles();
        drawPlayer();

        ctx.restore();
      }

      // ---------------------------
      // Main loop
      // ---------------------------
      function gameLoop(ts) {
        if (!state.lastTs) state.lastTs = ts;
        const dt = Math.min(0.033, (ts - state.lastTs) / 1000);
        state.lastTs = ts;

        update(dt);
        render();

        requestAnimationFrame(gameLoop);
      }

      // ---------------------------
      // Boot
      // ---------------------------
      window.addEventListener('resize', resizeCanvas);
      window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 120));

      resizeCanvas();
      showTitle();
      requestAnimationFrame(gameLoop);
    })();
  </script>
</body>
</html>
